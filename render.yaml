services:
  # ☕ Java Backend (Dockerized for 100% reliability)
  - type: web
    name: calculator-backend
    env: docker
    plan: free
    rootDir: backend

  # 🌐 React Frontend
  - type: web
    name: calculator-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
