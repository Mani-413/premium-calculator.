services:
  # ☕ Java Backend (Docker)
  - type: web
    name: calculator-backend
    env: docker
    rootDir: backend

  # 🌐 React Frontend (Static)
  - type: web
    name: calculator-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
