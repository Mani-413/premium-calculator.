services:
  # ☕ Java Backend
  - type: web
    name: calculator-backend
    env: java
    plan: free
    rootDir: backend
    # Render has Maven pre-installed
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/calculator-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21

  # 🌐 React Frontend
  - type: web
    name: calculator-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /(.*)
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        src: /(.*)
        dest: /index.html
